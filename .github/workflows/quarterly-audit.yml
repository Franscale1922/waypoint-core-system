name: Quarterly PageSpeed Audit

on:
  schedule:
    # Runs at 3:00 PM UTC on the 15th of Mar, Jun, Sep, Dec
    - cron: '0 15 15 3,6,9,12 *'
  # Also allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  lighthouse-audit:
    name: Run Lighthouse & Email Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Lighthouse CLI
        run: npm install -g lighthouse

      - name: Install Chromium
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y chromium-browser

      - name: Run audits and generate report
        env:
          CHROMIUM_PATH: /usr/bin/chromium-browser
        run: node .github/scripts/lighthouse-report.js

      - name: Send email report
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: PageSpeed Quarterly Report — ${{ env.AUDIT_DATE }}
          to: kelsey@waypointfranchise.com
          from: Waypoint Performance Bot <${{ secrets.GMAIL_USER }}>
          html_body: file:///tmp/lh-email.html

